<!DOCTYPE html>
<html>
<head>
    <title>Prosper ISD - Access Restricted</title>
    <style>
        html, body, * { cursor: none !important; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        body { background: #004d2c; color: #ffffff; font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        #gatekeeper { position: fixed; top: 0; left: 0; width: 50px; height: 50px; background: transparent; z-index: 9999; cursor: pointer !important; }
        .notice-container { max-width: 650px; padding: 50px; border: 3px solid #ffffff; background: rgba(0, 0, 0, 0.15); }
        .logo-text { font-size: 55px; font-weight: 900; margin-bottom: 10px; }
        h1 { font-size: 26px; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid white; padding-bottom: 15px; }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 20px; }
        .progress-box { margin-top: 30px; text-align: left; }
        .progress-bar-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.2); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: #ffffff; animation: report-load 10s forwards; }
        @keyframes report-load { 0% { width: 0%; } 100% { width: 100%; } }
    </style>
    <script>
        window.history.replaceState(null, "", "https://google.com");
        document.addEventListener('keydown', function(e) {
            if (e.key === "Escape") { window.location.replace('index.html'); }
        });
    </script>
</head>
<body>
    <div id="gatekeeper" onclick="window.location.replace('index.html')"></div>
    <div class="notice-container">
        <div class="logo-text">PROSPER ISD</div>
        <h1>SECURITY ALERT: ACCESS BLOCKED</h1>
        <p>This network connection has been flagged for unauthorized access attempts. Your credentials and browsing metadata are being forwarded to district administrators.</p>
        <div class="progress-box">
            <div style="font-family: monospace; font-size: 12px;">UPLOADING REPORT TO DISTRICT LOGS...</div>
            <div class="progress-bar-bg"><div class="progress-fill"></div></div>
        </div>
    </div>
</body>
</html>
